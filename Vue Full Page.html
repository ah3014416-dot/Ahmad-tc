    <style>
        /* إعداد خلفية الصفحة */
        
        body {
            margin: 0;
            height: 100vh;
            background: url("02.png") no-repeat center center fixed;
            background-size: cover;
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            color: white;
        }
        /* طبقة التغبش */
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            z-index: 1;
        }
        /* الفراشات */
        
        .butterflies {
            position: absolute;
            left: 256px;
            top: 106px;
            width: 1072px;
            height: 1207px;
            object-fit: contain;
            opacity: 0.34;
            animation: flyIn 4s ease-out forwards, float 6s ease-in-out 4s infinite;
            z-index: 2;
            pointer-events: none;
        }
        
        @keyframes flyIn {
            0% {
                transform: translateY(-80px) scale(0.9);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.34;
            }
        }
        
        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-25px);
            }
            100% {
                transform: translateY(0);
            }
        }
        /* الرأس - الشعار والعنوان */
        
        header {
            position: relative;
            z-index: 3;
            text-align: center;
            margin-top: 30px;
        }
        
        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 0px solid;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .title {
            margin-top: 15px;
            font-size: 14px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.6);
        }
        /* المحتوى */
        
        #app {
            position: relative;
            z-index: 3;
            text-align: center;
            margin-top: 60px;
        }
        
        h3 {
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 80px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        /* الأزرار */
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            transform: translateY(40px);
        }
        
        button {
            width: 220px;
            height: 50px;
            font-size: 16px;
            border-radius: 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }
        
        button:hover {
            background: rgb(132, 138, 148);
            color: #ff69b4;
            transform: translateY(-3px);
            border: 4vh solid white;
        }
    </style>
</head>

<body>
    <!-- طبقة التغبش -->
    <div class="overlay"></div>

    <!-- الفراشات -->
    <img src="./Vue Full Page_files/03.png" alt="butterflies" class="butterflies">

    <!-- الرأس -->
    <header>
        <img src="./Vue Full Page_files/لوغو.jpeg" alt="Logo" class="logo">
        <div class="title"> AlQuarizma</div>
    </header>

    <!-- المحتوى -->
    <div id="app" data-v-app=""><h3>create an account to get full access to unlimited resourcess ✨</h3><div class="buttons"><button> get started now</button><button> sign in</button></div></div>

    <script>
        const {
            createApp
        } = Vue;

        createApp({
            data() {
                return {
                    subTitle: "create an account to get full access to unlimited resourcess ✨",
                };
            },
            methods: {
                signIn() {
                    alert("تم الضغط على زر تسجيل الدخول ✅");
                },
                getStarted() {
                    alert("تم الضغط على زر ابدأ الآن 🚀");
                },
            },
        }).mount("#app");
    </script>
