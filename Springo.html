        body {
            background-color: #f0f7ff;
            padding: 20px;
            padding-bottom: 80px;
            color: #2c3e50;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.loaded {
            opacity: 1;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f0f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #3498db;
            border-top-color: #2980b9;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        .loading-text {
            font-size: 1.3rem;
            color: #2980b9;
            font-weight: bold;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .restaurant-header {
            text-align: center;
            margin-bottom: 25px;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.5s forwards 0.2s;
        }

        .restaurant-header h1 {
            font-size: 2.2rem;
            color: #2980b9;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #a8d8ff;
        }

        .restaurant-header p {
            font-size: 1rem;
            color: #7f8c8d;
            background: rgba(255,255,255,0.7);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            margin-top: 8px;
            border: 1px solid #3498db;
        }

        .restaurant-header i {
            margin-left: 5px;
            color: #3498db;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            position: sticky;
            top: 5px;
            background: rgba(240, 247, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 5px;
            border-radius: 60px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.5s forwards 0.3s;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .category-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 40px;
            background-color: #fff;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.1);
            transition: all 0.2s ease;
            border: 1px solid #d4e6f1;

        }

            color: white;
            border-color: #2980b9;
        }

        .category-btn.active i {

        }

            flex-direction: column;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.1);
            display: flex;
            flex-direction: row-reverse;
            align-items: stretch;
            transition: all 0.3s ease;
            border: 1px solid #d4e6f1;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.5s forwards;
        }

        .menu-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 28px rgba(52, 152, 219, 0.2);
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }

        .menu-card:nth-child(3) { animation-delay: 0.2s; }
        .menu-card:nth-child(4) { animation-delay: 0.25s; }
        .menu-card:nth-child(5) { animation-delay: 0.3s; }

        .menu-card:nth-child(7) { animation-delay: 0.4s; }

                    isSpecial: true
                },
                {
                    id: 26,
                    name: 'سلطة فتوش',
                    description: 'خس، خيار، طماطم، فجل، بقدونس، نعناع، وخبز مقرمش',
                    price: 22000,
                    category: 'salad',
                    image: 'https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=200&h=150&fit=crop',
                    isHot: false,
                    isVeg: true,
                    isSpecial: false
                }
            ];

            // أسماء التصنيفات
            const categoryNames = {
                main: 'أطباق رئيسية',
                appetizer: 'مقبلات',
                sandwich: 'ساندويشات',
                salad: 'سلطات',
                drink: 'مشروبات',
                dessert: 'حلويات'
            };

            const categories = [...new Set(menuData.map(item => item.category))];
            
            const categoryTabs = document.getElementById('categoryTabs');
            const menuContainer = document.getElementById('menuContainer');
            const loadingScreen = document.getElementById('loadingScreen');
            const body = document.body;

            let activeCategory = 'all';

            function renderItems(category) {
                const filteredItems = category === 'all' 
                    ? menuData 
                    : menuData.filter(item => item.category === category);

                if (filteredItems.length === 0) {
                    menuContainer.innerHTML = `<div class="no-items"><i class="fas fa-sad-tear"></i> لا توجد أصناف في هذا التصنيف</div>`;
                    return;
                }

                let htmlStr = '';
                filteredItems.forEach((item, index) => {
                    const imageStyle = item.image ? `background-image: url('${item.image}');` : '';
                    const imageClass = item.image ? '' : 'no-image';
                    const imageContent = !item.image ? '<i class="fas fa-image"></i>' : '';

                    const badges = [];
                    if (item.isHot) badges.push('<span class="badge hot"><i class="fas fa-pepper-hot"></i> حار</span>');
                    if (item.isVeg) badges.push('<span class="badge veg"><i class="fas fa-leaf"></i> نباتي</span>');
                    if (item.isSpecial) badges.push('<span class="badge special"><i class="fas fa-star"></i> خاص</span>');
                    if (item.hasCheese) badges.push('<span class="badge cheese"><i class="fas fa-cheese"></i> بالجبنة</span>');

                    const priceFormatted = (item.price / 1000).toFixed(3);

                    htmlStr += `
                        <div class="menu-card" data-category="${item.category}" style="animation-delay: ${0.1 + index * 0.05}s">
                            <div class="item-image ${imageClass}" style="${imageStyle}">${imageContent}</div>
                            <div class="item-details">
                                <div class="item-title">
                                    <h3>${item.name}</h3>
                                    <span class="item-price">${priceFormatted}</span>
                                </div>
                                <div class="item-description">
                                    <span>${item.description}</span>
                                </div>
                                <div class="item-description" style="margin-top:4px;">
                                    ${badges.join(' ')}
                                </div>
                            </div>
                        </div>
                    `;
                });

                menuContainer.innerHTML = htmlStr;
            }

            function buildCategoryTabs() {
                let buttonsHtml = `
                    <button class="category-btn active" data-category="all"><i class="fas fa-list-ul"></i> الكل</button>
                `;

                categories.forEach(cat => {
                    const catName = categoryNames[cat] || cat;
                    let icon = 'fa-utensils';
                    if (cat === 'appetizer') icon = 'fa-plate-wheat';
                    else if (cat === 'sandwich') icon = 'fa-burger';
                    else if (cat === 'salad') icon = 'fa-leaf';
                    else if (cat === 'drink') icon = 'fa-mug-saucer';
                    else if (cat === 'dessert') icon = 'fa-cake-candles';
                    
                    buttonsHtml += `
                        <button class="category-btn" data-category="${cat}"><i class="fas ${icon}"></i> ${catName}</button>
                    `;
                });

                categoryTabs.innerHTML = buttonsHtml;

                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const category = this.dataset.category;
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        activeCategory = category;
                        renderItems(activeCategory);
                        
                        window.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    });
                });
            }

            window.addEventListener('load', function() {
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    body.classList.add('loaded');
                    
                    buildCategoryTabs();
                    renderItems('all');
                    
                    const catParam = urlParams.get('cat');
                    if (catParam && categories.includes(catParam)) {
                        const btn = document.querySelector(`.category-btn[data-category="${catParam}"]`);
                        if (btn) {
                            setTimeout(() => {
                                btn.click();
                            }, 100);
                        }
                    }
                }, 1500);
            });

            document.getElementById('mapLink').href = 'https://maps.app.goo.gl/example';
        })();
    </script>
</body>
</html>
